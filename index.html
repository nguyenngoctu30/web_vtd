<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sách 3D</title>
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f0e6;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .flipbook-wrapper {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .flip-book {
      width: min(90vw, 1700px);
      height: min(90vh, 940px);
      background: #f5f0e6;
      border-radius: 12px;
      overflow: visible;
      box-shadow: 0 20px 40px rgba(245, 240, 230, 0.8);
    }

    .page {
      background: #f5f0e6;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
    }

    /* Xóa hoàn toàn khoảng trống giữa 2 trang */
    .stf__wrapper {
      gap: 0 !important;
    }

    .stf__block {
      padding: 0 !important;
      margin: 0 !important;
    }

    .stf__parent {
      gap: 0 !important;
    }

    .stf__wrapper > div,
    .stf__parent > div {
      margin: 0 !important;
      padding: 0 !important;
    }

    /* Dịch bìa đơn vào giữa */
    .flip-book.single-cover .stf__wrapper {
      transform: translateX(-25%);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .flip-book {
        width: min(95vw, 700px);
        height: min(95vh, 600px);
      }
    }
  </style>
</head>
<body>
  <div class="flipbook-wrapper">
    <div class="flip-book" id="flipbook"></div>
  </div>

  <script>
    const TOTAL_PAGES = 50;
    const imagePaths = Array.from({ length: TOTAL_PAGES }, (_, i) =>
      `page_${String(i + 1).padStart(3, '0')}.jpg`
    );

    const container = document.getElementById('flipbook');

    // Tạo các phần tử trang (chưa cần ảnh load xong)
    const pages = imagePaths.map((src) => {
      const page = document.createElement('div');
      page.className = 'page';
      const img = new Image();
      img.src = src;
      page.appendChild(img);
      return page;
    });

    /**
     * Trả về Promise chỉ resolve khi TẤT CẢ ảnh trong pages đã load xong.
     * Giải quyết triệt để vấn đề "nhảy layout" trên Vercel.
     */
    function waitForAllImages() {
      const promises = pages.map((page) => {
        const img = page.querySelector('img');
        return new Promise((resolve) => {
          if (img.complete) {
            // Ảnh đã load (cache, local)
            resolve();
          } else {
            img.onload = resolve;
            img.onerror = resolve; // vẫn tiếp tục nếu có ảnh lỗi
          }
        });
      });
      return Promise.all(promises);
    }

    // Bắt đầu chờ ảnh, sau đó mới tạo sách 3D
    waitForAllImages().then(() => {
      // Lúc này tất cả ảnh đã có kích thước thật => layout ổn định
      const pageFlip = new St.PageFlip(container, {
        width: 1400,
        height: 900,
        size: 'stretch',
        showCover: true,
        drawShadow: false,
        flippingTime: 450,
        autoSize: true,
        useMouseEvents: true,
        swipeDistance: 30,
        mobileScrollSupport: false,
        usePortrait: false,
      });

      pageFlip.loadFromHTML(pages);

      // Hàm xóa khoảng trống giữa hai trang
      function removeCenterGap() {
        requestAnimationFrame(() => {
          const wrapper = container.querySelector('.stf__wrapper');
          if (wrapper) {
            wrapper.style.gap = '0';
            wrapper.style.columnGap = '0';
          }
          container.querySelectorAll('.stf__block, .stf__parent, .stf__item').forEach(el => {
            el.style.margin = '0';
            el.style.padding = '0';
            el.style.gap = '0';
          });

          const blocks = container.querySelectorAll('.stf__block');
          if (blocks.length === 2) {
            blocks[0].style.right = '0';
            blocks[1].style.left = '0';
          }
        });
      }

      pageFlip.on('init', () => {
        container.classList.add('single-cover');
        removeCenterGap();
      });

      pageFlip.on('flip', (e) => {
        container.classList.toggle('single-cover', e.data === 0);
        removeCenterGap();
      });

      window.addEventListener('resize', () => {
        pageFlip.update();
        removeCenterGap();
      });
    });
  </script>
</body>
</html>
