<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sách 3D</title>
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f0e6;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .flipbook-wrapper {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .flip-book {
      width: min(90vw, 1700px);
      height: min(90vh, 940px);
      background: #f5f0e6;
      border-radius: 12px;
      overflow: visible;
      box-shadow: 0 20px 40px rgba(245, 240, 230, 0.8);

      /* Ẩn ban đầu, chờ layout ổn định mới hiện */
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .flip-book.ready {
      visibility: visible;
      opacity: 1;
    }

    .page {
      background: #f5f0e6;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;

      /* Giữ tỉ lệ khung cố định giúp tránh sụp đổ chiều cao */
      aspect-ratio: 14 / 9;
      width: 100%;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
    }

    /* Loại bỏ khoảng trống giữa hai trang */
    .stf__wrapper {
      gap: 0 !important;
      /* Ngăn transition ngoài ý muốn gây nhảy */
      transition: none !important;
    }

    .stf__block {
      padding: 0 !important;
      margin: 0 !important;
    }

    .stf__parent {
      gap: 0 !important;
    }

    .stf__wrapper > div,
    .stf__parent > div {
      margin: 0 !important;
      padding: 0 !important;
    }

    /* Dịch bìa đơn vào giữa – không dùng transition để tránh giật */
    .flip-book.single-cover .stf__wrapper {
      transform: translateX(-25%) !important;
      transition: none !important;
    }

    @media (max-width: 768px) {
      .flip-book {
        width: min(95vw, 700px);
        height: min(95vh, 600px);
      }
    }
  </style>
</head>
<body>
  <div class="flipbook-wrapper">
    <div class="flip-book" id="flipbook"></div>
  </div>

  <script>
    const TOTAL_PAGES = 50;
    const imagePaths = Array.from({ length: TOTAL_PAGES }, (_, i) =>
      `page_${String(i + 1).padStart(3, '0')}.jpg`
    );

    const container = document.getElementById('flipbook');

    // Tạo các phần tử trang với ảnh
    const pages = imagePaths.map((src) => {
      const page = document.createElement('div');
      page.className = 'page';
      const img = new Image();
      img.src = src;
      page.appendChild(img);
      return page;
    });

    // Chờ tất cả ảnh load hoàn tất
    function waitForAllImages() {
      return Promise.all(
        pages.map((page) => {
          const img = page.querySelector('img');
          return new Promise((resolve) => {
            if (img.complete) {
              resolve();
            } else {
              img.onload = resolve;
              img.onerror = resolve;
            }
          });
        })
      );
    }

    // Sau khi toàn bộ ảnh sẵn sàng
    waitForAllImages().then(() => {
      const pageFlip = new St.PageFlip(container, {
        width: 1400,
        height: 900,
        size: 'stretch',
        showCover: true,
        drawShadow: false,
        flippingTime: 450,
        autoSize: true,
        useMouseEvents: true,
        swipeDistance: 30,
        mobileScrollSupport: false,
        usePortrait: false,
      });

      pageFlip.loadFromHTML(pages);

      function removeCenterGap() {
        requestAnimationFrame(() => {
          const wrapper = container.querySelector('.stf__wrapper');
          if (wrapper) {
            wrapper.style.gap = '0';
            wrapper.style.columnGap = '0';
          }
          container.querySelectorAll('.stf__block, .stf__parent, .stf__item').forEach(el => {
            el.style.margin = '0';
            el.style.padding = '0';
            el.style.gap = '0';
          });

          const blocks = container.querySelectorAll('.stf__block');
          if (blocks.length === 2) {
            blocks[0].style.right = '0';
            blocks[1].style.left = '0';
          }
        });
      }

      // Khi thư viện khởi tạo xong
      pageFlip.on('init', () => {
        // Đảm bảo layout đã tính toán ổn định trước khi hiển thị
        // Sử dụng double rAF để chờ mọi rendering hoàn tất
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            // Thêm class single-cover cho trang bìa
            container.classList.add('single-cover');
            removeCenterGap();

            // Hiển thị sách một cách mượt mà
            container.classList.add('ready');
          });
        });
      });

      // Khi lật trang (từ bìa sang trang đôi hoặc ngược lại)
      pageFlip.on('flip', (e) => {
        if (e.data === 0) {
          container.classList.add('single-cover');
        } else {
          container.classList.remove('single-cover');
        }
        removeCenterGap();
      });

      // Cập nhật khi resize cửa sổ
      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          pageFlip.update();
          removeCenterGap();
        }, 100);
      });
    });
  </script>
</body>
</html>
