<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <title>Sách 3D</title>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;

      background: #f5f0e6;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .flipbook-wrapper {
      width: 100vw;
      height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      overflow: visible;
    }

    .flip-book {
      width: min(92vw, 1700px);
      height: min(92vh, 940px);

      background: transparent;

      overflow: visible;

      border-radius: 12px;
    }

    .page {
      background: #f5f0e6;

      display: flex;
      align-items: center;
      justify-content: center;

      overflow: hidden;
    }

    .page img {
      width: 100%;
      height: 100%;

      object-fit: fill;
      display: block;
    }

    /* Xóa khoảng trống giữa 2 trang */

    .stf__wrapper,
    .stf__parent,
    .stf__block,
    .stf__item {
      gap: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    .stf__wrapper > div,
    .stf__parent > div {
      margin: 0 !important;
      padding: 0 !important;
    }

    /* Trang đầu nằm giữa */

    .flip-book.single-left .stf__wrapper {
      transform: translateX(-25%) !important;
    }

    /* Trang cuối nằm giữa */

    .flip-book.single-right .stf__wrapper {
      transform: translateX(25%) !important;
    }

    /* Mobile */

    @media (max-width: 768px) {
      .flip-book {
        width: min(98vw, 700px);
        height: min(95vh, 600px);
      }
    }
  </style>
</head>

<body>

  <div class="flipbook-wrapper">
    <div class="flip-book" id="flipbook"></div>
  </div>

  <script>

    const TOTAL_PAGES = 50;

    const imagePaths = Array.from(
      { length: TOTAL_PAGES },
      (_, i) => `page_${String(i + 1).padStart(3, '0')}.jpg`
    );

    const container = document.getElementById('flipbook');

    const pages = imagePaths.map((src) => {

      const page = document.createElement('div');
      page.className = 'page';

      const img = new Image();

      img.src = src;

      page.appendChild(img);

      return page;
    });

    const pageFlip = new St.PageFlip(container, {

      width: 1400,
      height: 900,

      size: 'stretch',

      showCover: true,

      drawShadow: false,

      flippingTime: 450,

      autoSize: true,

      useMouseEvents: true,

      swipeDistance: 30,

      mobileScrollSupport: false,

      usePortrait: false
    });

    pageFlip.loadFromHTML(pages);

    /* =========================
       Xóa gap giữa 2 trang
    ========================== */

    function removeCenterGap() {

      requestAnimationFrame(() => {

        container.querySelectorAll(
          '.stf__wrapper, .stf__parent, .stf__block, .stf__item'
        ).forEach(el => {

          el.style.margin = '0';
          el.style.padding = '0';
          el.style.gap = '0';
        });

      });
    }

    /* =========================
       Căn giữa trang đầu/cuối
    ========================== */

    function updateBookPosition(pageIndex) {

      container.classList.remove(
        'single-left',
        'single-right'
      );

      /* Trang đầu */

      if (pageIndex === 0) {

        container.classList.add('single-left');
      }

      /* Trang cuối */

      else if (pageIndex >= TOTAL_PAGES - 2) {

        container.classList.add('single-right');
      }
    }

    /* =========================
       Init
    ========================== */

    pageFlip.on('init', () => {

      updateBookPosition(0);

      removeCenterGap();
    });

    /* =========================
       Khi lật trang
    ========================== */

    pageFlip.on('flip', (e) => {

      updateBookPosition(e.data);

      removeCenterGap();
    });

    /* =========================
       Resize
    ========================== */

    window.addEventListener('resize', () => {

      pageFlip.update();

      removeCenterGap();
    });

  </script>

</body>
</html>
