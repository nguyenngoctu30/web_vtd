<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <title>Sách 3D</title>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#f5f0e6;
      font-family:sans-serif;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .flipbook-wrapper{
      width:100vw;
      height:100vh;

      display:flex;
      align-items:center;
      justify-content:center;

      overflow:hidden;
      position:relative;
    }

    .flip-book{

      width:min(92vw,1700px);
      height:min(92vh,940px);

      position:relative;

      overflow:visible;

      transition:left .25s ease;
    }

    .page{
      background:#f5f0e6;

      display:flex;
      align-items:center;
      justify-content:center;

      overflow:hidden;
    }

    .page img{
      width:100%;
      height:100%;

      object-fit:fill;
      display:block;

      user-select:none;
      pointer-events:none;
    }

    /* =========================
       Xóa gap giữa 2 trang
    ========================== */

    .stf__wrapper,
    .stf__parent,
    .stf__block,
    .stf__item{
      margin:0 !important;
      padding:0 !important;
      gap:0 !important;
    }

    .stf__wrapper > div,
    .stf__parent > div{
      margin:0 !important;
      padding:0 !important;
    }

    /* =========================
       Trang đầu nằm giữa
    ========================== */

    .flip-book.single-left{
      left:-12.5%;
    }

    /* =========================
       Trang cuối nằm giữa
    ========================== */

    .flip-book.single-right{
      left:12.5%;
    }

    /* =========================
       Mobile
    ========================== */

    @media (max-width:768px){

      .flip-book{
        width:98vw;
        height:95vh;
      }

      .flip-book.single-left{
        left:-25%;
      }

      .flip-book.single-right{
        left:25%;
      }
    }

  </style>
</head>

<body>

  <div class="flipbook-wrapper">
    <div class="flip-book" id="flipbook"></div>
  </div>

  <script>

    const TOTAL_PAGES = 50;

    const imagePaths = Array.from(
      { length: TOTAL_PAGES },
      (_, i) => `page_${String(i + 1).padStart(3,'0')}.jpg`
    );

    const container = document.getElementById('flipbook');

    let pageFlip;

    /* =========================
       PRELOAD IMAGE
    ========================== */

    async function preloadImages(paths){

      const promises = paths.map(src => {

        return new Promise(resolve => {

          const img = new Image();

          img.onload = resolve;
          img.onerror = resolve;

          img.src = src;
        });

      });

      await Promise.all(promises);
    }

    /* =========================
       Remove center gap
    ========================== */

    function removeCenterGap(){

      requestAnimationFrame(() => {

        container.querySelectorAll(
          '.stf__wrapper, .stf__parent, .stf__block, .stf__item'
        ).forEach(el => {

          el.style.margin = '0';
          el.style.padding = '0';
          el.style.gap = '0';
        });

      });

    }

    /* =========================
       Căn giữa đầu/cuối
    ========================== */

    function updateBookPosition(pageIndex){

      container.classList.remove(
        'single-left',
        'single-right'
      );

      /* Trang đầu */

      if(pageIndex === 0){

        container.classList.add('single-left');
      }

      /* Trang cuối */

      else if(pageIndex >= TOTAL_PAGES - 2){

        container.classList.add('single-right');
      }
    }

    /* =========================
       INIT BOOK
    ========================== */

    async function initBook(){

      /* preload ảnh trước */

      await preloadImages(imagePaths);

      /* tạo pages */

      const pages = imagePaths.map(src => {

        const page = document.createElement('div');

        page.className = 'page';

        const img = document.createElement('img');

        img.src = src;

        page.appendChild(img);

        return page;
      });

      /* init pageflip */

      pageFlip = new St.PageFlip(container,{

        width:1400,
        height:900,

        size:'stretch',

        minWidth:300,
        maxWidth:2000,

        minHeight:400,
        maxHeight:2000,

        maxShadowOpacity:0,

        showCover:true,

        mobileScrollSupport:false,

        usePortrait:false,

        autoSize:true,

        drawShadow:false,

        flippingTime:450,

        swipeDistance:30,

        useMouseEvents:true
      });

      pageFlip.loadFromHTML(pages);

      /* =========================
         INIT
      ========================== */

      pageFlip.on('init', () => {

        updateBookPosition(0);

        removeCenterGap();

        /* fix render production */

        setTimeout(() => {

          pageFlip.update();

          removeCenterGap();

        },100);

      });

      /* =========================
         FLIP
      ========================== */

      pageFlip.on('flip', (e) => {

        updateBookPosition(e.data);

        removeCenterGap();
      });

      /* =========================
         RESIZE
      ========================== */

      window.addEventListener('resize', () => {

        pageFlip.update();

        removeCenterGap();
      });

    }

    initBook();

  </script>

</body>
</html>
