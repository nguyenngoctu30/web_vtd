<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <title>Sách 3D</title>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5f0e6;
      font-family: sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .flipbook-wrapper {
      width: 100vw;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      overflow: hidden;
      position: relative;
    }

    .flip-book {
      width: min(92vw, 1700px);
      height: min(92vh, 950px);

      position: relative;

      display: flex;
      justify-content: center;
      align-items: center;

      overflow: visible;

      visibility: hidden;
      opacity: 0;

      transition: opacity 0.3s ease;
    }

    .flip-book.ready {
      visibility: visible;
      opacity: 1;
    }

    .page {
      width: 100%;
      height: 100%;

      background: #f5f0e6;

      display: flex;
      justify-content: center;
      align-items: center;

      overflow: hidden;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    /* FIX KHOẢNG CÁCH GIỮA 2 TRANG */
    .stf__wrapper,
    .stf__parent,
    .stf__block {
      gap: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    .stf__block {
      box-shadow: none !important;
    }

    .stf__item {
      margin: 0 !important;
      padding: 0 !important;
    }

    /* FIX CENTER */
    .stf__wrapper {
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
    }

    /* KHÔNG DÙNG translateX nữa */
    .flip-book.single-cover .stf__wrapper {
      transform: none !important;
    }

    @media (max-width: 768px) {
      .flip-book {
        width: 96vw;
        height: 88vh;
      }
    }
  </style>
</head>

<body>
  <div class="flipbook-wrapper">
    <div class="flip-book" id="flipbook"></div>
  </div>

  <script>
    const TOTAL_PAGES = 50;

    const imagePaths = Array.from(
      { length: TOTAL_PAGES },
      (_, i) => `page_${String(i + 1).padStart(3, "0")}.jpg`
    );

    const container = document.getElementById("flipbook");

    const pages = imagePaths.map((src) => {
      const page = document.createElement("div");
      page.className = "page";

      const img = new Image();
      img.src = src;

      page.appendChild(img);

      return page;
    });

    function waitForAllImages() {
      return Promise.all(
        pages.map((page) => {
          const img = page.querySelector("img");

          return new Promise((resolve) => {
            if (img.complete) {
              resolve();
            } else {
              img.onload = resolve;
              img.onerror = resolve;
            }
          });
        })
      );
    }

    function removeCenterGap() {
      const wrapper = container.querySelector(".stf__wrapper");

      if (wrapper) {
        wrapper.style.gap = "0";
        wrapper.style.columnGap = "0";
      }

      container
        .querySelectorAll(".stf__block, .stf__parent, .stf__item")
        .forEach((el) => {
          el.style.margin = "0";
          el.style.padding = "0";
          el.style.gap = "0";
        });
    }

    async function initBook() {
      await waitForAllImages();

      /* CHỜ VERCEL RENDER XONG */
      await new Promise((resolve) => requestAnimationFrame(resolve));
      await new Promise((resolve) => requestAnimationFrame(resolve));

      const pageFlip = new St.PageFlip(container, {
        width: 1400,
        height: 900,

        size: "stretch",

        minWidth: 320,
        maxWidth: 1800,

        minHeight: 220,
        maxHeight: 1200,

        showCover: true,
        drawShadow: false,

        flippingTime: 450,

        autoSize: true,

        usePortrait: false,

        mobileScrollSupport: false,
      });

      pageFlip.loadFromHTML(pages);

      setTimeout(() => {
        removeCenterGap();
        container.classList.add("ready");
      }, 100);

      pageFlip.on("flip", () => {
        removeCenterGap();
      });

      let resizeTimer;

      window.addEventListener("resize", () => {
        clearTimeout(resizeTimer);

        resizeTimer = setTimeout(() => {
          pageFlip.update();
          removeCenterGap();
        }, 200);
      });
    }

    initBook();
  </script>
</body>
</html>
